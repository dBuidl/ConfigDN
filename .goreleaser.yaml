version: 2

project_name: ConfigDN

dist: .builds

before:
  hooks:
    - go mod tidy

builds:
  - id: build_cgo
    main: ./
    binary: ConfigDN
    ldflags:
      - -s -w -X github.com/dBuidl/ConfigDN.Version={{ .Version }}
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64

  - id: build_noncgo
    main: ./
    binary: ConfigDN
    ldflags:
      - -s -w -X github.com/dBuidl/ConfigDN.Version={{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - 7
    ignore:
      - goos: windows
        goarch: arm
      - goos: darwin
        goarch: arm

release:
  draft: true

archives:
  - id: archive_cgo
    ids: [build_cgo]
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}_cgo'
    formats: [zip]
    files:
      - LICENSE*
      - CHANGELOG*

  - id: archive_noncgo
    ids: [build_noncgo]
    formats: [zip]
    files:
      - LICENSE*
      - CHANGELOG*

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: '{{ incpatch .Version }}-next'

changelog:
  sort: asc
#  filters:
#    exclude:
#      - '^examples:'
#      - '^ui:'
